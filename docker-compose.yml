

services:
  postgres:
    image: postgres:latest
    container_name: vaultash_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"   # binds container port 5432 to host port 5432 on all interfaces
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
